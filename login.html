<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portal privado dos membros da Masayoshi Order">
  <meta name="theme-color" content="#07070a">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111116'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='13' fill='%23c9a84c'%3EMSY%3C/text%3E%3C/svg%3E">
  <title>MSY Portal — Acesso</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="login">
  <div class="login-page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <span class="login-logo-mark">MSY</span>
          <div class="login-logo-sep"><span>Masayoshi Order</span></div>
          <span class="login-logo-sub">Portal Privado dos Membros</span>
        </div>
        <div class="login-title">Acesso Restrito</div>
        <div class="login-error" id="loginError">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="loginErrorMsg">Credenciais inválidas.</span>
        </div>
        <form class="login-form" id="loginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="loginEmail"><i class="fa-solid fa-at"></i> E-mail</label>
            <input class="form-input" type="email" id="loginEmail" placeholder="seu@msy.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPass"><i class="fa-solid fa-lock"></i> Senha</label>
            <div class="input-wrap">
              <input class="form-input" type="password" id="loginPass" placeholder="••••••••" required>
              <button type="button" class="pw-toggle" id="pwToggle"><i class="fa-regular fa-eye" id="pwIcon"></i></button>
            </div>
          </div>
          <button class="login-btn" type="button" id="loginBtn">Entrar na Ordem</button>
          <div style="text-align:center;margin-top:14px">
            <a href="#" id="forgotLink"
               style="font-size:0.8rem;color:var(--text-3);transition:color var(--t1) var(--ease)"
               onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-3)'">
              Esqueci minha senha
            </a>
          </div>
        </form>

      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/push.js"></script>
  <script src="js/app.js"></script>
  <script src="js/core/realtime.js"></script>
  <script>
    const pwToggle = document.getElementById('pwToggle');
    const pwInput  = document.getElementById('loginPass');
    const pwIcon   = document.getElementById('pwIcon');
    pwToggle.addEventListener('click', () => {
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
      pwIcon.className = pwInput.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
    });
  </script>
</body>
</html>
